# 放在 Nginx 的 http {} 作用域中，每个 zone 只能定义一次。
limit_req_zone $binary_remote_addr zone=agent_chat:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=agent_session:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=agent_admin:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=agent_conn:10m;
